# Скопируйте этот файл в .streamlit/secrets.toml
# и заполните данными из JSON-ключа Google Service Account.
#
# Инструкция:
# 1. Создайте Service Account в Google Cloud Console
# 2. Скачайте JSON-ключ
# 3. Скопируйте значения полей из JSON сюда
# 4. Расшарьте Google Sheet на email из client_email (роль: Viewer)

[gcp_service_account]
type = "service_account"
project_id = "your-project-id"
private_key_id = "key-id-from-json"
private_key = "-----BEGIN PRIVATE KEY-----\nYOUR_PRIVATE_KEY_HERE\n-----END PRIVATE KEY-----\n"
client_email = "dashboard-reader@your-project.iam.gserviceaccount.com"
client_id = "123456789"
auth_uri = "https://accounts.google.com/o/oauth2/auth"
token_uri = "https://oauth2.googleapis.com/token"
auth_provider_x509_cert_url = "https://www.googleapis.com/oauth2/v1/certs"
client_x509_cert_url = "https://www.googleapis.com/robot/v1/metadata/x509/dashboard-reader%40your-project.iam.gserviceaccount.com"
